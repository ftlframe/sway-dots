# --- General ---
set -g default-shell /usr/bin/fish
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",ghostty:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 50000
set -g focus-events on

# --- Prefix ---
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Vim keybinds ---
setw -g mode-keys vi

# Copy mode
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi h send -X cursor-left
bind -T copy-mode-vi j send -X cursor-down
bind -T copy-mode-vi k send -X cursor-up
bind -T copy-mode-vi l send -X cursor-right

# Pane splits (vim-style)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# --- Rose-Pine Colors ---
set -g status-style "bg=#1a1520,fg=#e0ceed"
set -g status-left "#[bg=#2d2735,fg=#9ccfd8,bold] #S #[bg=#1a1520] "
set -g status-right "#[fg=#614e6e]│ #[fg=#8e6da6]%d %b #[fg=#614e6e]│ #[fg=#e0ceed,bold]%H:%M "
set -g status-left-length 30
set -g status-right-length 50

# Window tabs
setw -g window-status-format "#[fg=#614e6e] #I #W "
setw -g window-status-current-format "#[bg=#2d2735,fg=#9ccfd8,bold] #I #W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#2d2735"
set -g pane-active-border-style "fg=#9ccfd8"

# Messages
set -g message-style "bg=#1a1520,fg=#f5b0ef"
set -g message-command-style "bg=#1a1520,fg=#9ccfd8"

# Copy mode highlight
setw -g mode-style "bg=#2d2735,fg=#f5b0ef"
